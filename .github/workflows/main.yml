name: Build application

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: >-
    ${{ github.ref != 'refs/heads/master' &&
        github.event_name != 'merge_group' &&
        !startsWith(github.ref, 'refs/heads/gh-readonly-queue') }}

jobs:
  detect-md-only:
    runs-on: ubuntu-24.04
    outputs:
      md_only: ${{ steps.detect.outputs.md_only }}
    steps:
      - name: Detect markdown-only pull request
        id: detect
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "md_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --jq '.[].filename')"
          if [ -z "$files" ]; then
            echo "md_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          md_only=true
          while IFS= read -r file; do
            case "${file,,}" in
              *.md) ;;
              *)
                md_only=false
                break
                ;;
            esac
          done <<< "$files"

          echo "md_only=$md_only" >> "$GITHUB_OUTPUT"

  pre-commit:
    uses: ./.github/workflows/pre-commit.yml
  ubuntu:
    needs:
      - detect-md-only
      - pre-commit
    if: ${{ needs.detect-md-only.outputs.md_only != 'true' }}
    uses: ./.github/workflows/ubuntu.yml
    with:
      is_nightly: ${{ github.event_name == 'schedule' }}
  mac:
    needs:
      - detect-md-only
      - pre-commit
    if: ${{ needs.detect-md-only.outputs.md_only != 'true' }}
    uses: ./.github/workflows/mac.yml
  windows:
    needs:
      - detect-md-only
      - pre-commit
    if: ${{ needs.detect-md-only.outputs.md_only != 'true' }}
    uses: ./.github/workflows/windows.yml
  perf:
    needs:
      - detect-md-only
      - ubuntu
      - mac
      - windows
    if: ${{ needs.detect-md-only.outputs.md_only != 'true' }}
    uses: ./.github/workflows/perf.yml

  pages:
    needs:
      - detect-md-only
      - perf
    if: ${{ needs.detect-md-only.outputs.md_only != 'true' }}
    uses: ./.github/workflows/pages.yml
